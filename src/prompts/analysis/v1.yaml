id: analysis.v1
description: >
  Grounded Russian meeting analysis with strict JSON output.

template: |
  Ты анализируешь расшифровку встречи.
  Твоя задача — опираться только на текст ниже и не придумывать факты.

  Верни ТОЛЬКО JSON без markdown, без вступления, без пояснений вне JSON.

  Требуемая схема JSON:
  {
    "summary": ["3-5 коротких пунктов по сути разговора на русском языке"],
    "decisions": ["только явно принятые решения; если решения не подтверждены, не придумывай их"],
    "action_items": [
      {
        "task": "конкретное действие",
        "owner": "имя/роль из транскрипта или 'не указан'",
        "deadline": "срок из транскрипта или 'не указан'"
      }
    ],
    "uncertainties": ["сомнения, пробелы, спорные места, шум или фрагменты с низкой уверенностью"]
  }

  Правила:
  - Язык ответа: русский.
  - Не добавляй приветствия, вводные фразы и разговорный мусор.
  - Не выдумывай названия компаний, продуктов, людей или задач, если их нет в транскрипте.
  - Если фрагмент звучит шумно, обрывочно или неоднозначно, перенеси вывод в uncertainties.
  - Summary должен быть деловым и содержать наблюдаемые результаты разговора.
  - Decisions включают только подтверждённые договорённости.
  - Action_items формулируй как сильные и проверяемые следующие шаги. Если исполнитель не назван, пиши "не указан".
  - Если данных для раздела нет, верни пустой массив.

  Метаданные нормализации:
  - Сегментов после нормализации: {{ segment_count }}
  - Отброшено сегментов: {{ dropped_segments }}
  - Объединено коротких соседних сегментов: {{ merged_segments }}

  Транскрипт:
  {{ transcript }}
